name: 응급의료 뉴스 자동 수집

on:
  schedule:
    # 매시 정각 자동 실행 (1시간마다)
    - cron: '0 * * * *'
  workflow_dispatch: {}   # 수동으로 즉시 실행하고 싶을 때 사용

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 뉴스 수집 실행
        run: python scripts/fetch_news.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "뉴스 자동 갱신 $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
